<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Camera (Sender)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        /* 1. Full-screen video background */
        video { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        /* 2. The Main UI Panel */
        .ui-container { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); padding: 20px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.3s ease; }
        .id-box { background: rgba(255, 255, 255, 0.15); padding: 12px; border-radius: 8px; font-size: 26px; font-weight: bold; margin: 15px 0; letter-spacing: 2px; }
        .action-btn { padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background-color: #28a745; color: white; width: 100%; }
        p { margin: 0; font-size: 14px; color: #ddd; }
        h2 { margin: 0 0 10px 0; font-size: 20px; }
        /* 3. The Toggle UI Button (Top Right) */
        .toggle-btn { position: absolute; top: 15px; right: 15px; z-index: 20; background: rgba(0, 0, 0, 0.5); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; backdrop-filter: blur(5px); }
        /* 4. The Document Scanner Viewfinder (Clean) */
        .viewfinder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85vw; max-width: 400px; aspect-ratio: 810 / 1080; z-index: 5; pointer-events: none; }
        /* The center crosshair */
        .viewfinder::before, .viewfinder::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); top: 50%; left: 50%; transform: translate(-50%, -50%); }
        /* Horizontal line of the crosshair */
        .viewfinder::before { width: 30px; height: 2px; } 
        /* Vertical line of the crosshair */
        .viewfinder::after { width: 2px; height: 30px; }
    </style>
</head>
<body>

    <button id="toggleUiBtn" class="toggle-btn">👁️ Hide</button>

    <div class="viewfinder"></div>

    <div class="ui-container" id="mainUi">
        <h2>SpyCam Sender</h2>
        <p>Type this ID into your laptop:</p>
        <div class="id-box" id="myId">Loading...</div>
        <button id="startBtn" class="action-btn">Start Camera</button>
    </div>

    <video id="localVideo" autoplay playsinline muted></video>

    <script>
        const localVideo = document.getElementById('localVideo');
        const startBtn = document.getElementById('startBtn');
        const toggleUiBtn = document.getElementById('toggleUiBtn');
        const mainUi = document.getElementById('mainUi');
        const peer = new Peer();
        let audioCtx;

        // Show the ID once connected to the PeerJS server
        peer.on('open', (id) => {
            document.getElementById('myId').innerText = id;
        });

        // Handle incoming data connection
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data === 'screenshot' && audioCtx) {
                    // Play a short confirmation beep sound
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch tone
                    gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                }
            });
        });

        // Start Camera Logic
        startBtn.addEventListener('click', () => {
            // Initialize audio context dynamically upon a user interaction
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: { ideal: "environment" },
                    width: { ideal: 4096 }, 
                    height: { ideal: 2160 },
                    frameRate: { ideal: 5, max: 10 } 
                }, 
                audio: false 
            })
            .then((stream) => {
                localVideo.srcObject = stream;
                startBtn.style.display = 'none'; // Hide the start button

                peer.on('call', (call) => {
                    call.answer(stream);
                    console.log("Connected to Laptop!");
                });
            })
            .catch((err) => {
                alert('Camera error: Ensure permissions are granted.');
                console.error(err);
            });
        });

        // Hide/Show UI Logic
        let uiVisible = true;
        toggleUiBtn.addEventListener('click', () => {
            uiVisible = !uiVisible;
            if (uiVisible) {
                mainUi.style.opacity = '1';
                mainUi.style.pointerEvents = 'auto'; // allow clicking inside UI
                toggleUiBtn.innerText = '👁️ Hide';
            } else {
                mainUi.style.opacity = '0';
                mainUi.style.pointerEvents = 'none'; // disable clicks when hidden
                toggleUiBtn.innerText = '👁️ Show';
            }
        });
    </script>
</body>
</html>
