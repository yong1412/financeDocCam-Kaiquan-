<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpyCam Hub</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        /* Styling the links to look like big clickable cards */
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            width: 250px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: #007bff;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #007bff;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #bbbbbb;
            line-height: 1.4;
        }
        
        /* A different color for the receiver card for contrast */
        .card.receiver:hover {
            border-color: #28a745;
        }
        .card.receiver .card-title {
            color: #28a745;
        }
    </style>
</head>
<body>

    <h1>WebRTC Camera System</h1>
    <p>Select the role for this device to continue.</p>

    <div class="container">
        
        <a href="sender.html" class="card">
            <div class="card-icon">📱</div>
            <div class="card-title">Phone Camera</div>
            <div class="card-desc">Open this on your phone to stream your back camera and generate an ID.</div>
        </a>

        <a href="receiver.html" class="card receiver">
            <div class="card-icon">💻</div>
            <div class="card-title">Laptop Monitor</div>
            <div class="card-desc">Open this on your laptop to connect to the phone and take screenshots.</div>
        </a>

    </div>

</body>
</html>
